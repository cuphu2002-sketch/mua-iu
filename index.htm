<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Món quà dành cho em</title>
    <meta property="og:title" content="Món quà nhỏ dành cho em!" />
    <meta property="og:description" content="Nhấn vào để xem bí mật anh giấu trong này nhé..." />
    <meta property="og:image" content="https://i.postimg.cc/qRS2Xhhb/Screenshot-2026-04-16-211050.png" />
    <meta property="og:url" content="https://cuphu2002-sketch.github.io/Tang-e-/" />
    <meta property="og:type" content="website" />

    <style>
        :root {
            --neon-pink: #ff2d75;
            --neon-blue: #00d2ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        /* Nền mờ ảo bao phủ full toàn màn hình */
        .bg-blur {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
           background: url('mua.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.3) blur(10px);
            z-index: -1;
        }

        .main-ui {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            text-align: center;
        }

        .title-top {
            color: #fff;
            font-size: 1.6rem;
            font-style: italic;
            text-shadow: 0 0 10px var(--neon-pink);
            margin-bottom: 25px;
            letter-spacing: 2px;
            animation: fadeIn 2s ease-in-out;
        }

        /* Quả cầu pha lê - Căn giữa khuôn mặt siêu nét */
        .crystal-ball {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
            box-shadow: 0 0 35px var(--neon-pink), inset 0 0 20px var(--neon-blue);
            animation: pulse 3s infinite ease-in-out alternate;
        }

        .crystal-ball img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 20%; /* Căn khuôn mặt chính giữa */
            border: 2px solid rgba(255,255,255,0.4);
            image-rendering: -webkit-optimize-contrast;
        }

        .title-bottom {
            margin-top: 35px;
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
            font-style: italic;
            text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink);
            animation: textFade 2s infinite alternate;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }
        @keyframes textFade { from { opacity: 0.7; } to { opacity: 1; } }

        .footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="bg-blur"></div>
<canvas id="fireworksCanvas"></canvas>

<div class="main-ui">
    <div class="title-top">Mủa Ơi</div>
    <div class="crystal-ball">
       <img src="mua.png" alt="Princess">
    </div>
    <div class="title-bottom">Em Làm Công Chúa Của Anh Nhé</div>
    <div class="footer">Dành tặng cho Mủa</div>
</div>

<script>
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    const SPAWN_RATE = 0.04; // Tốc độ bắn nhanh bình thường, lãng mạn
    const COLORS = ['#ff2d75', '#ff85a2', '#ffffff', '#00d2ff'];

    class Heart {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.angle = Math.random() * Math.PI * 2;
            this.velocity = Math.random() * 2 + 1.5; // Tốc độ trôi nhẹ nhàng sống động
            this.friction = 0.98;
            this.gravity = 0.01;
            this.size = Math.random() * 5 + 10;
            this.alpha = 1;
            this.decay = Math.random() * 0.005 + 0.005; 
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.font = `${this.size}px Arial`;
            ctx.fillText('❤', this.x, this.y);
            ctx.restore();
        }

        update() {
            this.velocity *= this.friction;
            this.x += Math.cos(this.angle) * this.velocity;
            this.y += Math.sin(this.angle) * this.velocity + this.gravity;
            this.alpha -= this.decay;
        }
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Heart(x, y, COLORS[Math.floor(Math.random() * COLORS.length)]));
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (Math.random() < SPAWN_RATE) {
            createExplosion(Math.random() * canvas.width, Math.random() * canvas.height * 0.8);
        }

        particles.forEach((p, index) => {
            p.update();
            p.draw();
            if (p.alpha <= 0) particles.splice(index, 1);
        });

        requestAnimationFrame(animate);
    }

    window.addEventListener('click', (e) => { createExplosion(e.clientX, e.clientY); });
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    animate();
</script>

</body>
</html>
