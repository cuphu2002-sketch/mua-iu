<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thị Mủa ơi</title>
    <meta property="og:title" content="Món quà nhỏ dành cho em!" />
    <meta property="og:description" content="Nhấn vào để xem bí mật anh giấu trong này nhé..." />
    <meta property="og:image" content="https://i.postimg.cc/qRS2Xhhb/Screenshot-2026-04-16-211050.png" />

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        .bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://i.postimg.cc/qRS2Xhhb/Screenshot-2026-04-16-211050.png') no-repeat center center; 
            background-size: cover; filter: brightness(0.2) blur(10px); z-index: -1; }
        .main-ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .title-top { color: #fff; font-size: 1.8rem; font-style: italic; text-shadow: 0 0 10px #ff2d75; margin-bottom: 20px; }
        .crystal-ball { position: relative; width: 260px; height: 260px; border-radius: 50%; padding: 5px; 
            background: linear-gradient(45deg, #ff2d75, #00d2ff); box-shadow: 0 0 40px #ff2d75; animation: pulse 3s infinite alternate; }
        .crystal-ball img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; object-position: center 20%; border: 2px solid #fff; }
        .title-bottom { margin-top: 30px; color: #fff; font-size: 3rem; font-weight: bold; text-shadow: 0 0 20px #ff2d75; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <canvas id="fw"></canvas>
    <div class="main-ui">
        <div class="title-top">Thị Mủa ơi</div>
        <div class="crystal-ball">
            <img src="https://i.postimg.cc/qRS2Xhhb/Screenshot-2026-04-16-211050.png" alt="Princess">
        </div>
        <div class="title-bottom">Em Làm Công Chúa Của Anh Nhé</div>
    </div>

    <script>
        const c = document.getElementById('fw'), x = c.getContext('2d');
        let p = [];
        c.width = window.innerWidth; c.height = window.innerHeight;
        class Heart {
            constructor(tx, ty) {
                this.x = tx; this.y = ty;
                this.a = Math.random() * Math.PI * 2;
                this.v = Math.random() * 2 + 1;
                this.s = Math.random() * 10 + 10;
                this.al = 1;
            }
            show() {
                x.globalAlpha = this.al; x.fillStyle = '#ff2d75';
                x.font = `${this.s}px Arial`; x.fillText('❤', this.x, this.y);
            }
            move() {
                this.x += Math.cos(this.a) * this.v;
                this.y += Math.sin(this.a) * this.v + 0.5;
                this.al -= 0.01;
            }
        }
        function draw() {
            x.clearRect(0, 0, c.width, c.height);
            if (Math.random() < 0.05) {
                let rx = Math.random() * c.width, ry = Math.random() * c.height * 0.7;
                for(let i=0; i<15; i++) p.push(new Heart(rx, ry));
            }
            p.forEach((h, i) => { h.move(); h.show(); if(h.al <= 0) p.splice(i, 1); });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
